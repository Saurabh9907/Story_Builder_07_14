<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>your-story</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      
      <section>    
        <div class="main-content-container">
          <div class="sub-content-container">
            <div class="horizontal-line"></div>
            <div class="story-header">
              <div class="profile-section">
                <div class="profile-img">
                  <!-- profile image removed -->
                  <img id="displayProfile" src="" alt="profile" /> 

                  <span class="plus">+</span>
                </div>

                <div class="user-info">
                  <div class="top-row">
                    <span class="username" id="displayUsername">alex_walker</span>
                    <span class="time" id="displayStoryTime">7s</span>
                  </div>
                  <span class="sub-text">From Create Mode</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="center-text">
        <div class="center-text-main">
          <h1 id="displayMainText" >Lorem ipsum dolor sit amet consectetur ipsum dolor sit adipisicing elit.</h1>
        </div>
      </section>
      <section>
        <div class="lower-text">
            <span>Say Somthing...</span>
        </div>
        <div class="lower-symble">
            <div class="action">
                <div class="share symble"><img src="images/share.png" alt=""></div>
                <span>Share to</span>
            </div>
            <div class="action">
                <div class="whatsapp symble"><img src="images/whatsapp.png" alt=""></div>
                <span>WhatsApp</span>
            </div>
            <div class="action">
                <div class="mention symble"><img src="images/mention.png" alt=""></div>
                <span>Mention</span>
            </div>
            <div class="action">
                <div class="more symble"><img src="images/three-dots.png" alt=""></div>
                <span>More</span>
            </div>
            
        </div>
      </section>
    </div>

    <script src="script.js"></script>

  </body>
</html>
