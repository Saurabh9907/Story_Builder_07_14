<!doctype html>
<html lang="en">

    <link rel="stylesheet" href="style.css" />

            <div class="vo5g">Vo 5G</div>
          </div>
          <div class="sub-nav-element2 signal">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">

          </div>
          <div class="sub-nav-element3">
            <span id="displayBattery">70</span>
          </div>
        </div>
      </div>
      <section>
        <div class="main-content-container">
          <div class="sub-content-container">
            <div class="horizontal-line"></div>
            <div class="story-header">
              <div class="profile-section">
                <div class="profile-img">
                  <img id="displayProfile" src="images/png0.jpg" alt="profile" />
                  <span class="plus">+</span>
                </div>

                <div class="user-info">
                  <div class="top-row">
                    <span class="username" id="displayUsername">issaurabh.prajapati</span>
                    <span class="time" id="displayStoryTime">7s</span>
                  </div>
                  <span class="sub-text">From Create Mode</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="center-text">
        <div class="center-text-main">
          <h1 id="displayMainText" >Lorem ipsum dolor sit amet consectetur adipisicing elit.</h1>
        </div>
      </section>
      <section>
        <div class="lower-text">
            <span>Say Somthing...</span>
        </div>
        <div class="lower-symble">
            <div class="action">
                <div class="share symble"><img src="images/share.png" alt=""></div>
                <span>Share to</span>
            </div>
            <div class="action">
                <div class="whatsapp symble"><img src="images/whatsapp.png" alt=""></div>
                <span>WhatsApp</span>
            </div>
            <div class="action">
                <div class="mention symble"><img src="images/mention.png" alt=""></div>
                <span>Mentino</span>
            </div>
            <div class="action">
                <div class="more symble"><img src="images/three-dots.png" alt=""></div>
                <span>More</span>
            </div>
            
        </div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
